name: Futurerestore

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  macOS:
    runs-on: macos-15-intel
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'true'
        fetch-depth: 0
    - name: Update Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16'
    - name: Install dependencies
      run: |
        brew install cmake libplist libusbmuxd libimobiledevice libirecovery openssl zlib curl libzip tihmstar/procursus/libfragmentzip
    - name: Build
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DOPENSSL_ROOT_DIR=$(brew --prefix openssl)
        make -j$(sysctl -n hw.logicalcpu)
    - name: Package
      run: |
        mkdir -p output
        cp build/src/futurerestore output/futurerestore
        cd output
        tar -cJf ../futurerestore-macOS-RELEASE.tar.xz futurerestore
    - name: macOS RELEASE Archive
      uses: actions/upload-artifact@v4
      with:
        name: futurerestore-macOS-RELEASE
        path: futurerestore-macOS-RELEASE.tar.xz
        retention-days: 7
